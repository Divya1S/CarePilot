name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt -r requirements-dev.txt

      - name: Compile check
        run: python -m compileall -q backend reconciler llm.py conftest.py

      - name: Run tests
        run: pytest -q
        # The suite is fully offline (conftest sets RELAY_MOCK=1) — no API key needed.
        # The live eval corpus (python -m reconciler.eval_corpus) is run manually with a key.
